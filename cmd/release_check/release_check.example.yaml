  # - { name: upload_server_job,      display: 录音转码服务,     highRisk: false, expectCommit: auto, minInstances: 1 }
  # - { name: iot_cloud_platform_open, display: 开放服务,        highRisk: true,  expectCommit: auto, minInstances: 1 }
